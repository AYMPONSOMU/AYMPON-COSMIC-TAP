<meta charset="UTF-8">

<title>AYMPONSOMU COSMIC TAP</title>

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
}
  /* MINI YANTRAS */

.mini-yantra{

position:fixed;

width:55px;
height:55px;

object-fit:contain;

z-index:1;

opacity:0.8;

filter:
drop-shadow(0 0 10px gold);

animation:floatMini 6s ease-in-out infinite;

}

/* POSITIONS */

.yantra1{

top:120px;
left:15px;

}

.yantra2{

top:120px;
right:15px;

}

.yantra3{

bottom:140px;
left:20px;

}

.yantra4{

bottom:140px;
right:20px;

}

/* FLOAT */

@keyframes floatMini{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-12px);
}

100%{
transform:translateY(0px);
}

}

/* BODY */

body{

font-family:Arial,sans-serif;

background:black;

color:white;

overflow-x:hidden;

min-height:100vh;

display:flex;
justify-content:center;
align-items:flex-start;

padding-top:40px;
padding-bottom:100px;

}

/* LOADER */

#loader{

position:fixed;
top:0;
left:0;

width:100%;
height:100%;

background:black;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

z-index:9999;

}

#loader h1{

font-size:32px;
color:gold;

margin-bottom:20px;

text-shadow:0 0 20px gold;

animation:pulse 1.5s infinite;

}

#loader p{

font-size:18px;
color:white;

}

@keyframes pulse{

0%{
opacity:0.5;
transform:scale(1);
}

50%{
opacity:1;
transform:scale(1.05);
}

100%{
opacity:0.5;
transform:scale(1);
}

}

/* GAME */

.game-container{

text-align:center;

padding:30px;

width:100%;
max-width:500px;

}

.title{

font-size:32px;

margin-bottom:10px;

color:gold;

text-shadow:0 0 20px gold;

}

.tagline{

margin-bottom:20px;

font-size:16px;

color:#ccc;

}

.score{

font-size:42px;

margin:20px 0;

font-weight:bold;

color:white;

}

.energy{

margin-bottom:15px;

font-size:18px;

color:#00ffff;

}

/* TAP BUTTON */

.tap-button{

width:220px;
height:220px;

border-radius:50%;

border:none;

cursor:pointer;

outline:none;

-webkit-tap-highlight-color:transparent;

user-select:none;

background:
conic-gradient(
gold,
orange,
gold,
yellow,
gold
);

display:flex;
justify-content:center;
align-items:center;

box-shadow:
0 0 20px gold,
0 0 40px orange;

}

/* INNER SYMBOL */

.inner-symbol{

width:120px;
height:120px;

border-radius:50%;

background:black;

display:flex;
justify-content:center;
align-items:center;

box-shadow:
0 0 20px gold inset;

overflow:hidden;

position:relative;

}

/* YANTRA IMAGE */

.yantra-image{

width:90px;
height:90px;

object-fit:contain;

pointer-events:none;

animation:spinYantra 4s linear infinite;

filter:
drop-shadow(0 0 10px gold)
drop-shadow(0 0 20px orange);

}

/* ROTATE */

@keyframes spinYantra{

0%{
transform:rotate(0deg);
}

100%{
transform:rotate(360deg);
}

}

/* WALLET BUTTON */

.wallet-btn{

margin-top:30px;

padding:15px 30px;

font-size:18px;

border:none;

border-radius:10px;

background:gold;

color:black;

font-weight:bold;

cursor:pointer;

box-shadow:0 0 20px gold;

}

/* SOCIAL LINKS */

.social-links{

margin-top:25px;

display:flex;

justify-content:center;

gap:15px;

flex-wrap:wrap;

}

.social-links a{

padding:12px 20px;

background:black;

border:1px solid gold;

border-radius:10px;

color:gold;

text-decoration:none;

font-weight:bold;

box-shadow:0 0 15px gold;

transition:0.3s;

}

.social-links a:hover{

transform:scale(1.05);

background:gold;

color:black;

}

/* FLOATING SCORE */

.floating-score{

position:absolute;

font-size:24px;

font-weight:bold;

color:gold;

animation:floatUp 1s forwards;

pointer-events:none;

}

@keyframes floatUp{

0%{

opacity:1;
transform:translateY(0);

}

100%{

opacity:0;
transform:translateY(-100px);

}

}

/* PARTICLES */

.particle{

position:absolute;

width:12px;
height:12px;

border-radius:50%;

background:gold;

pointer-events:none;

animation:explode 1s forwards;

box-shadow:
0 0 10px gold,
0 0 20px orange;

}

@keyframes explode{

0%{

opacity:1;

transform:
translate(0,0)
scale(1);

}

100%{

opacity:0;

transform:
translate(var(--x), var(--y))
scale(0);

}

}

/* FLOATING YANTRA */

.floating-yantra{

position:absolute;

width:40px;
height:40px;

pointer-events:none;

animation:floatYantra 1s forwards;

filter:
drop-shadow(0 0 10px gold);

}

@keyframes floatYantra{

0%{

opacity:1;

transform:
translateY(0)
scale(1);

}

100%{

opacity:0;

transform:
translateY(-120px)
scale(1.5);

}

}

/* FOOTER */

.footer{

position:fixed;

bottom:10px;

width:100%;

text-align:center;

font-size:12px;

color:rgba(255,255,255,0.6);

}

</style>

<body>

<!-- LOADER -->

<div id="loader">

<h1>AYMPONSOMU COSMIC TAP</h1>

<p>Loading Cosmic Energy...</p>

</div>

<!-- GAME -->
<img src="images/agni.png" class="mini-yantra yantra1">

<img src="images/lakshmi.png" class="mini-yantra yantra2">

<img src="images/navagraha.png" class="mini-yantra yantra3">

<img src="images/shakti.png" class="mini-yantra yantra4">
<div class="game-container">

<h1 class="title">
AYMPONSOMU COSMIC TAP
</h1>

<p class="tagline">
Tap The Cosmic Energy
</p>

<div class="score" id="score">
0
</div>

<div class="energy">
⚡ Planetary Energy Activated
</div>

<div id="level" class="energy">
LEVEL : Cosmic Beginner
</div>

<button class="tap-button" id="tapBtn">

<div class="inner-symbol">

<img src="images/yantra.png" class="yantra-image">

</div>

</button>

<br>

<button class="wallet-btn" onclick="connectWallet()">

Connect MetaMask

</button>

<div class="social-links">

<a href="https://x.com/somus1963" target="_blank">
𝕏 Follow On X
</a>

<a href="https://t.me/aymponweb3" target="_blank">
✈ Join Telegram
</a>

</div>

</div>

<footer class="footer">

© 2026 AYMPONSOMU COSMIC TAP™  
All Rights Reserved

</footer>

<script>

const scoreDisplay=document.getElementById('score');

const tapBtn=document.getElementById('tapBtn');
const audioContext = new (
window.AudioContext ||
window.webkitAudioContext
)();
let score=localStorage.getItem('aymponScore') || 0;

scoreDisplay.innerText=score;

updateLevel();

/* FLOATING SCORE */

function createFloatingScore(x,y){

const float=document.createElement('div');

float.className='floating-score';

float.innerText='+1';

float.style.left=x+'px';

float.style.top=y+'px';

document.body.appendChild(float);

setTimeout(()=>{

float.remove();

},1000);

}

/* PARTICLES */

function createParticles(x,y){

for(let i=0;i<12;i++){

const particle=document.createElement('div');

particle.className='particle';

particle.style.left=x+'px';

particle.style.top=y+'px';

particle.style.setProperty(
'--x',
(Math.random()*200-100)+'px'
);

particle.style.setProperty(
'--y',
(Math.random()*200-100)+'px'
);

document.body.appendChild(particle);

setTimeout(()=>{

particle.remove();

},1000);

}

}

/* FLOATING YANTRA */

function createYantra(x,y){

const yantra=document.createElement('img');

yantra.src='images/yantra.png';

yantra.className='floating-yantra';

yantra.style.left=(x-20)+'px';

yantra.style.top=(y-20)+'px';

document.body.appendChild(yantra);

setTimeout(()=>{

yantra.remove();

},1000);

}

/* LEVEL */

function updateLevel(){

const level=document.getElementById('level');

if(score >= 1000){

level.innerText='LEVEL : Cosmic Master';

}else if(score >= 500){

level.innerText='LEVEL : Astro Warrior';

}else if(score >= 100){

level.innerText='LEVEL : Mystic Explorer';

}else{

level.innerText='LEVEL : Cosmic Beginner';

}

}

/* TAP */

tapBtn.addEventListener('click',(e)=>{
  
audioContext.resume();
  
const oscillator =
audioContext.createOscillator();

const gainNode =
audioContext.createGain();

oscillator.connect(gainNode);

gainNode.connect(audioContext.destination);

oscillator.type='sine';

oscillator.frequency.value=220;

gainNode.gain.value=0.2;

oscillator.start();

oscillator.stop(
audioContext.currentTime + 0.08
);
score++;

scoreDisplay.innerText=score;

localStorage.setItem('aymponScore',score);

updateLevel();

createFloatingScore(e.clientX,e.clientY);

createParticles(e.clientX,e.clientY);

createYantra(e.clientX,e.clientY);

if(navigator.vibrate){

navigator.vibrate(40);

}

});

/* WALLET */

async function connectWallet(){

if(window.ethereum){

try{

const accounts=await ethereum.request({

method:'eth_requestAccounts'

});

alert('Wallet Connected: '+accounts[0]);

}catch(err){

alert('Connection Rejected');

}

}else{

alert('MetaMask Not Installed');

}

}

/* LOADER */

window.addEventListener('load',()=>{

setTimeout(()=>{

document.getElementById('loader').style.display='none';

},2500);

});

</script>
