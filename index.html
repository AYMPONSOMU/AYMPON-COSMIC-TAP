<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AYMPONSOMU COSMIC TAP</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Arial,sans-serif;

background-image:
linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)),
url("images/cosmic-bg.jpg");

background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;

color:white;
overflow-x:hidden;
min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

}

/* LOADER */

#loader{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

z-index:9999;

}

#loader h1{

font-size:32px;
color:gold;
margin-bottom:20px;

text-shadow:0 0 20px gold;

animation:pulse 1.5s infinite;

}

#loader p{

font-size:18px;

}

@keyframes pulse{

0%{
opacity:0.5;
transform:scale(1);
}

50%{
opacity:1;
transform:scale(1.05);
}

100%{
opacity:0.5;
transform:scale(1);
}

}

/* GAME */

.game-container{

text-align:center;
padding:30px;
width:100%;
max-width:500px;

backdrop-filter:blur(10px);

}

.title{

font-size:32px;
margin-bottom:10px;

color:gold;

text-shadow:0 0 20px gold;

}

.tagline{

margin-bottom:20px;
font-size:16px;
color:#ddd;

}

.score{

font-size:40px;
margin:20px 0;
font-weight:bold;

}

.energy{

margin-bottom:15px;
font-size:18px;
color:#00ffff;

}

.tap-button{

width:220px;
height:220px;

border-radius:50%;

border:none;

font-size:28px;
font-weight:bold;

background:radial-gradient(circle, gold, orange);

color:black;

cursor:pointer;

box-shadow:
0 0 20px gold,
0 0 40px orange;

transition:0.2s;

animation:rotateGlow 6s linear infinite;

}

.tap-button:active{

transform:scale(0.95);

}

@keyframes rotateGlow{

0%{
transform:rotate(0deg);
}

100%{
transform:rotate(360deg);
}

}

.wallet-btn{

margin-top:30px;

padding:15px 30px;

font-size:18px;

border:none;
border-radius:10px;

background:gold;
color:black;

font-weight:bold;

cursor:pointer;

box-shadow:0 0 20px gold;

}

/* FLOATING SCORE */

.floating-score{

position:absolute;

font-size:24px;
font-weight:bold;

color:gold;

animation:floatUp 1s forwards;

pointer-events:none;

}

@keyframes floatUp{

0%{

opacity:1;
transform:translateY(0);

}

100%{

opacity:0;
transform:translateY(-100px);

}

}

</style>
</head>

<body>

<!-- LOADER -->

<div id="loader">

<h1>AYMPONSOMU COSMIC TAP</h1>

<p>Loading Cosmic Energy...</p>

</div>

<!-- GAME -->

<div class="game-container">

<h1 class="title">
AYMPONSOMU COSMIC TAP
</h1>

<p class="tagline">
Tap The Cosmic Energy
</p>

<div class="score" id="score">
0
</div>

<div class="energy">
⚡ Planetary Energy Activated
</div>

<div id="level" class="energy">
LEVEL : Cosmic Beginner
</div>

<button class="tap-button" id="tapBtn">

✴ TAP ✴

</button>

<br>

<button class="wallet-btn" onclick="connectWallet()">

Connect MetaMask

</button>

</div>

<script>

const scoreDisplay = document.getElementById('score');

const tapBtn = document.getElementById('tapBtn');

let score = localStorage.getItem('aymponScore') || 0;

scoreDisplay.innerText = score;

updateLevel();

/* FLOATING SCORE */

function createFloatingScore(x,y){

const float = document.createElement('div');

float.className='floating-score';

float.innerText='+1';

float.style.left=x+'px';

float.style.top=y+'px';

document.body.appendChild(float);

setTimeout(()=>{

float.remove();

},1000);

}

/* LEVEL */

function updateLevel(){

const level = document.getElementById('level');

if(score >= 1000){

level.innerText = 'LEVEL : Cosmic Master';

}else if(score >= 500){

level.innerText = 'LEVEL : Astro Warrior';

}else if(score >= 100){

level.innerText = 'LEVEL : Mystic Explorer';

}else{

level.innerText = 'LEVEL : Cosmic Beginner';

}

}

/* TAP */

tapBtn.addEventListener('click',(e)=>{

score++;

scoreDisplay.innerText=score;

localStorage.setItem('aymponScore', score);

updateLevel();

createFloatingScore(e.clientX,e.clientY);

if(navigator.vibrate){

navigator.vibrate(40);

}

});

/* WALLET */

async function connectWallet(){

if(window.ethereum){

try{

const accounts = await ethereum.request({

method: 'eth_requestAccounts'

});

alert('Wallet Connected: '+accounts[0]);

}catch(err){

alert('Connection Rejected');

}

}else{

alert('MetaMask Not Installed');

}

}

/* LOADER */

window.addEventListener('load', () => {

setTimeout(() => {

document.getElementById('loader').style.display = 'none';

}, 2500);

});

</script>

</body>
</html>
